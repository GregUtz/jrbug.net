name: Deploy site

on:
  push:
    branches:
      - main
    paths:
      - "site/**"
      - ".github/workflows/deploy.yml"
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

concurrency:
  group: production
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    environment: production
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v3
        with:
          workload_identity_provider: projects/924177605853/locations/global/workloadIdentityPools/github-actions/providers/jrbug-net
          service_account: github-jrbug-deployer@wise-zephyr-204219.iam.gserviceaccount.com

      - name: Set up Google Cloud CLI
        uses: google-github-actions/setup-gcloud@v3

      - name: Publish site
        run: >-
          gcloud storage rsync site gs://www.jrbug.net
          --recursive
          --delete-unmatched-destination-objects
          --cache-control="public,max-age=300"
